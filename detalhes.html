<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/aside.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/detalhes.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&family=Bungee&family=Changa+One:ital@0;1&family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0" />
    <title>Detalhes do Filme - NEXTFILM</title>
</head>
<body> 
    
    <header class="cabecalho d-flex p-3">
        <h1 class="texto_logo m-0 fs-3">NEXTFILM</h1>
    </header>

    <div class="wrapper-principal d-flex align-items-center py-5">
        <main class="container">
            
            <a href="index.html" class="btn btn-voltar mb-4 d-inline-flex align-items-center gap-2">
                <span class="material-symbols-outlined fs-6">arrow_back</span> Voltar para o Início
            </a>
            
            <div class="row card-detalhes align-items-center">
                
                <div class="col-12 col-md-4 text-center mb-4 mb-md-0">
                    <img id="detalhe-capa" src="" alt="Capa do Filme" class="img-fluid capa-filme-detalhe" style="max-width: 280px; width: 100%;">
                </div>

                <div class="col-12 col-md-8 d-flex flex-column justify-content-center ps-md-4">
                    
                    <span id="detalhe-genero" class="badge badge-genero align-self-start mb-3 fs-6">Gênero</span>
                    
                    <h2 id="detalhe-titulo" class="titulo-filme-detalhe display-5 fw-bold mb-2">Título do Filme</h2>
                    
                    <div class="d-flex flex-wrap gap-2 gap-sm-3 mb-4 info-meta align-items-center">
                        <span class="text-warning fw-bold">⭐ <span id="detalhe-avaliacao">0.0</span>/10</span>
                        <span class="separador">|</span>
                        <span id="detalhe-ano" class="text-light opacity-75">Ano</span>
                        <span class="separador">|</span>
                        <span class="text-light opacity-75">
                            Assista em: <span id="detalhe-stream" class="stream-link">Streaming</span>
                        </span>
                    </div>

                    <h4 class="sinopse-titulo mb-2 fs-5 text-uppercase">Sinopse</h4>
                    <p id="detalhe-descricao" class="sinopse-texto fs-5 text-start m-0" style="text-align: justify !important;"></p>
                </div>

            </div>
        </main>
    </div>

    <script src="JS/dados.js"></script> 
    <script src="JS/detalhes.js"></script>
    <script src="JS/script.js"></script>
</body>
</html>
