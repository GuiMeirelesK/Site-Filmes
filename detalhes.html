<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/aside.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&family=Bungee&family=Changa+One:ital@0;1&family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0" />
    <title>Detalhes do Filme - NEXTFILM</title>
</head>
<body class="bg-dark text-light"> <header class="cabecalho d-flex p-3 border-bottom border-secondary">
        <h1 class="texto_logo m-0 text-primary">NEXTFILM</h1>
    </header>

    <main class="container mt-5">
        <a href="index.html" class="btn btn-outline-light mb-4">
            &larr; Voltar para o Início
        </a>
        <div class="row bg-secondary p-4 rounded shadow">
            
            <div class="col-12 col-md-4 text-center mb-4 mb-md-0">
                <img id="detalhe-capa" src="" alt="Capa do Filme" class="img-fluid rounded shadow-lg" style="max-width: 300px;">
            </div>

            <div class="col-12 col-md-8 d-flex flex-column justify-content-center">
                <span id="detalhe-genero" class="badge bg-primary align-self-start mb-2 fs-6">Gênero</span>
                
                <h2 id="detalhe-titulo" class="display-5 fw-bold mb-3">Título do Filme</h2>
                
                <div class="d-flex gap-3 mb-4 text-warning fw-bold">
                    <span>⭐ <span id="detalhe-avaliacao">0.0</span>/10</span>
                    <span class="text-light">|</span>
                    <span id="detalhe-ano" class="text-light">Ano</span>
                    <span class="text-light">|</span>
                    <span class="text-info">Assista em: <span id="detalhe-stream">Streaming</span></span>
                </div>

                <h4 class="mb-2">Sinopse</h4>
                <p id="detalhe-descricao" class="fs-5 lh-lg" style="text-align: justify;"></p>
            </div>

        </div>
    </main>
    <script src="JS/dados.js"></script> 
    <script src="JS/detalhes.js"></script>
    <script src="JS/script.js"></script>
</body>
</html>
