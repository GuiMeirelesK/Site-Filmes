<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/aside.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&family=Bungee&family=Changa+One:ital@0;1&family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0" />
    <title>NEXTFILM - Recomendação de Filmes</title>
</head>
<body>

    <header class="cabecalho d-flex flex-column flex-lg-row justify-content-between align-items-center px-4">
        <div class="logo">
            <h1 class="texto_logo m-2 mt-3">NEXTFILM</h1>
        </div>
        <nav>
            <ul class="menu d-flex list-unstyled m-0 gap-3">
                <li><a href="">Sobre</a></li>
                <li><a href="">Favoritos</a></li>
                <li><a href="">Ajuda</a></li>
                <span class="material-symbols-outlined fs-2">account_circle</span> 
            </ul>
        </nav>
    </header>

    <main class="container-fluid wrapper-principal">
        <div class="row g-0">
            
            <section class="esquerda col-12 col-lg-9 p-3 order-2 order-lg-1">
                
                <section class="fileira-filmes">
                    <h2 class="titulo-genero">AÇÃO</h2>
                    <div class="container-filmes d-flex" data-genero="Ação"></div>
                </section>
                <section class="fileira-filmes">
                    <h2 class="titulo-genero">SUSPENSE</h2>
                    <div class="container-filmes d-flex" data-genero="Suspense"></div>
                </section>
                <section class="fileira-filmes">
                    <h2 class="titulo-genero">TERROR</h2>
                    <div class="container-filmes d-flex" data-genero="Terror"></div>
                </section>
                <section class="fileira-filmes">
                    <h2 class="titulo-genero">COMÉDIA</h2>
                    <div class="container-filmes d-flex" data-genero="Comédia"></div>
                </section>
                <section class="fileira-filmes">
                    <h2 class="titulo-genero">ROMANCE</h2>
                    <div class="container-filmes d-flex" data-genero="Romance"></div>
                </section>
                <section class="fileira-filmes">
                    <h2 class="titulo-genero">FICÇÃO CIENTIFICA</h2>
                    <div class="container-filmes d-flex" data-genero="Ficção Científica"></div>
                </section>
                <footer class="mt-5 p-2" class="pe">
                    <nav class="social d-flex justify-content-center gap-4 w-100">
                         <a href="https://github.com/GuiMeirelesK" target="_blank" class="social_media">GitHub</a>
                         <a href="#" class="social_media">Instagram</a>
                         <a href="#" class="social_media">LinkedIn</a>
                    </nav>
                </footer>
            </section>
            <aside class="direita col-12 col-lg-3 p-4 order-1 order-lg-2">
                <div class="barra-pesquisa mb-4">
                    <input type="text" placeholder="Pesquisar filme..." class="input-pesquisa w-100">
                </div>
                <div class="d-grid gap-2">
                    <button class="botao-genero">Ação</button>
                    <button class="botao-genero">Suspense</button>
                    <button class="botao-genero">Terror</button>
                    <button class="botao-genero">Comédia</button>
                    <button class="botao-genero">Romance</button>
                    <button class="botao-genero">Ficção Cientifica</button>
                </div>
            </aside>
        </div>
    </main>
    <script src="JS/script.js"></script>
</body>
</html>
